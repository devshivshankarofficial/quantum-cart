apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-cart-backend
  labels:
    app: quantum-cart-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quantum-cart-backend
  template:
    metadata:
      labels:
        app: quantum-cart-backend
    spec:
      containers:
        - name: api
          image: quantum-cart-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: quantum-cart-secrets
            - configMapRef:
                name: quantum-cart-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi