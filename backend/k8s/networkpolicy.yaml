apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quantum-cart-backend-ingress
spec:
  podSelector:
    matchLabels:
      app: quantum-cart-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53